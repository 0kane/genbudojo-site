<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Арая Рю Гэнбу Додзё</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans:wght@300;400;600&display=swap');

  :root {
    --ink: #2c2418;
    --paper: #f5f0e8;
    --accent: #8b2500;
    --accent-light: #c45a3c;
    --red-circle: #e8756d;
    --stone: #7a7062;
    --cream: #faf6ef;
    --shadow: rgba(44, 36, 24, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans', sans-serif;
    font-weight: 300;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.7;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    background: rgba(245, 240, 232, 0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(44, 36, 24, 0.08);
    padding: 0 2rem;
  }
  nav .nav-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  nav .logo {
    display: flex; align-items: center; gap: 0.7rem;
    text-decoration: none;
  }
  nav .logo svg { height: 40px; width: auto; }
  nav .logo .logo-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem; font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  nav ul { list-style: none; display: flex; gap: 2rem; }
  nav ul li a {
    text-decoration: none; color: var(--stone);
    font-size: 0.85rem; font-weight: 400;
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }
  nav ul li a:hover { color: var(--accent); }

  .hamburger {
    display: none; background: none; border: none; cursor: pointer;
    width: 28px; height: 20px; position: relative;
  }
  .hamburger span {
    display: block; width: 100%; height: 2px; background: var(--ink);
    position: absolute; left: 0; transition: all 0.3s;
  }
  .hamburger span:nth-child(1) { top: 0; }
  .hamburger span:nth-child(2) { top: 9px; }
  .hamburger span:nth-child(3) { top: 18px; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    padding: 6rem 2rem 4rem;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: attr(data-kanji);
    position: absolute;
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(8rem, 20vw, 18rem);
    color: rgba(139, 37, 0, 0.04);
    font-weight: 700;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap; pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-logo { margin-bottom: 2rem; }
  .hero-logo .logo-grid {
    display: inline-grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    width: 180px;
  }
  .hero-logo .logo-cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 2.8rem;
    color: var(--ink);
    position: relative;
  }
  .hero-logo .logo-cell.has-circle::before {
    content: '';
    position: absolute;
    width: 85%; height: 85%;
    border-radius: 50%;
    background: var(--red-circle);
    z-index: 0;
  }
  .hero-logo .logo-cell.has-circle span { position: relative; z-index: 1; }
  @media (max-width: 768px) {
    .hero-logo .logo-grid { width: 140px; }
    .hero-logo .logo-cell { font-size: 2.2rem; }
  }
  .hero h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700; color: var(--ink);
    margin-bottom: 0.3em; letter-spacing: 0.02em;
  }
  .hero .subtitle {
    font-size: 1.05rem; color: var(--stone);
    margin-bottom: 2rem; font-weight: 300;
    max-width: 550px; margin-left: auto; margin-right: auto;
  }
  .hero .cta {
    display: inline-block; padding: 0.8rem 2.5rem;
    background: var(--accent); color: var(--cream);
    text-decoration: none; font-size: 0.85rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: none; transition: background 0.3s;
  }
  .hero .cta:hover { background: var(--accent-light); }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--stone), transparent);
    max-width: 120px; opacity: 0.3;
  }
  .divider .dot {
    width: 6px; height: 6px; background: var(--accent);
    border-radius: 50%; margin: 0 1rem;
  }

  /* ── SECTIONS ── */
  section { padding: 5rem 2rem; }
  .section-inner { max-width: 900px; margin: 0 auto; }
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.8rem; font-weight: 700;
    text-align: center; margin-bottom: 1.8rem; color: var(--ink);
  }

  #about { background: var(--cream); }
  #schedule { background: var(--cream); }
  #contact { background: var(--cream); }

  /* ── ABOUT ── */
  .about-text {
    text-align: center; max-width: 650px; margin: 0 auto;
    font-size: 1.05rem; color: var(--stone);
  }

  /* ── GALLERY ── */
  .gallery-container {
    position: relative; width: 100%; max-width: 700px;
    margin: 0 auto; aspect-ratio: 16 / 10; overflow: hidden;
    border: 1px solid rgba(44, 36, 24, 0.1);
    box-shadow: 0 8px 40px var(--shadow);
    background: #e8e2d8;
  }
  .gallery-slide {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 1.2s ease;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .gallery-slide.active { opacity: 1; }
  .gallery-slide img {
    width: 100%; height: 100%;
    object-fit: cover; position: absolute; inset: 0;
  }
  .gallery-caption {
    text-align: center;
    padding: 0.8rem 1rem 0;
    font-size: 0.9rem;
    color: var(--stone);
    letter-spacing: 0.04em;
  }
  .gallery-slide svg { width: 100%; height: 100%; }

  .gallery-dots {
    display: flex; justify-content: center; gap: 0.5rem;
    margin-top: 1.2rem;
  }
  .gallery-dots button {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid var(--stone); background: transparent;
    cursor: pointer; transition: all 0.3s; padding: 0;
  }
  .gallery-dots button.active {
    background: var(--accent); border-color: var(--accent);
    transform: scale(1.3);
  }

  /* ── SCHEDULE ── */
  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
  }
  .schedule-card {
    background: var(--paper); padding: 1.8rem; text-align: center;
    border: 1px solid rgba(44, 36, 24, 0.08);
    transition: box-shadow 0.3s;
  }
  .schedule-card:hover { box-shadow: 0 4px 20px var(--shadow); }
  .schedule-card .day {
    font-size: 1.1rem; font-weight: 600;
    color: var(--accent); margin-bottom: 0.5em;
  }
  .schedule-card .time { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.3em; }
  .schedule-card .level {
    font-size: 0.85rem; color: var(--stone);
    letter-spacing: 0.05em;
  }

  /* ── PRICING ── */
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem; max-width: 500px; margin: 0 auto;
  }
  .pricing-card {
    background: var(--cream); padding: 2rem 1.5rem; text-align: center;
    border: 1px solid rgba(44, 36, 24, 0.08);
    transition: box-shadow 0.3s;
  }
  .pricing-card:hover { box-shadow: 0 4px 20px var(--shadow); }
  .pricing-card .price-label {
    font-size: 0.85rem; color: var(--stone);
    margin-bottom: 0.5em; letter-spacing: 0.05em;
  }
  .pricing-card .price {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.6rem; font-weight: 700;
    color: var(--accent);
  }

  /* ── LOCATION ── */
  .location-wrapper {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 2.5rem; align-items: center;
  }
  .location-info p { margin-bottom: 1em; color: var(--stone); }
  .location-info strong { color: var(--ink); font-weight: 600; }
  .map-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background: #e8e2d8;
    border: 1px solid rgba(44, 36, 24, 0.1);
    display: flex; align-items: center; justify-content: center;
    color: var(--stone); font-size: 0.9rem; overflow: hidden;
  }
  .map-placeholder iframe { width: 100%; height: 100%; border: none; }

  /* ── CONTACT ── */
  .contact-grid {
    display: flex; justify-content: center; gap: 2.5rem;
    flex-wrap: wrap;
  }
  .contact-item {
    text-align: center; min-width: 120px;
  }
  .contact-item a {
    text-decoration: none; color: var(--ink);
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    transition: color 0.3s;
  }
  .contact-item a:hover { color: var(--accent); }
  .contact-item .icon-svg { width: 36px; height: 36px; fill: var(--accent); transition: fill 0.3s; }
  .contact-item a:hover .icon-svg { fill: var(--accent-light); }
  .contact-item .label {
    font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--stone); margin-top: 0.2em;
  }
  .contact-item .value { font-weight: 400; font-size: 0.9rem; }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 2.5rem 2rem;
    font-size: 0.8rem; color: var(--stone);
    border-top: 1px solid rgba(44, 36, 24, 0.08);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    nav ul { display: none; }
    nav ul.open {
      display: flex; flex-direction: column;
      position: absolute; top: 60px; left: 0; right: 0;
      background: var(--paper); padding: 1rem 2rem;
      border-bottom: 1px solid rgba(44, 36, 24, 0.1);
      gap: 1rem;
    }
    .hamburger { display: block; }
    .location-wrapper { grid-template-columns: 1fr; }
    .hero-logo svg { height: 150px; }
  }

  /* ── FADE-IN ── */
  .fade-in {
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">

<section id="about">

<section id="pricing">

</section>

<div class="divider"><div class="dot"></div></div>

<section id="location">
  <div class="section-inner fade-in">

    <div class="location-wrapper">
      <div class="location-info" id="location-info"></div>
      <div class="map-placeholder" id="map-container">
        <span>Карта</span>
      </div>

</section>

<div class="divider"><div class="dot"></div></div>

<!-- CONTACT -->
<section id="contact">
  <div class="section-inner fade-in">
    <h2 class="section-title" id="contact-title"></h2>
    <div class="contact-grid" id="contact-grid"></div>
  </div>
</section>

<!-- FOOTER -->
<footer id="footer"></footer>

<script src="data.js"></script>
<script>
// ── Dojo logo as CSS grid — 3 cols × 5 rows ──
// Col 2: 荒谷流 (rows 1-3), 武 on red circle (row 4), 道 (row 5)
// Col 1: 元 (row 4)
// Col 3: 場 (row 5)
function dojoLogoHTML() {
  // Grid: [empty][荒][empty] / [empty][谷][empty] / [empty][流][empty] / [元][武●][empty] / [empty][道][場]
  const cells = [
    '', '荒', '',
    '', '谷', '',
    '', '流', '',
    '元', '武', '',
    '', '道', '場'
  ];
  return `<div class="logo-grid">${cells.map((ch, i) =>
    ch === '武'
      ? `<div class="logo-cell has-circle"><span>${ch}</span></div>`
      : `<div class="logo-cell">${ch}</div>`
  ).join('')}</div>`;
}

// Compact horizontal nav: 荒谷流 元武道場 with red circle on 武
function dojoLogoNavSVG() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 40" height="36">
    <style>.k { font-family: 'Noto Serif JP', serif; font-weight: 700; fill: #2c2418; }</style>
    <text x="0" y="30" class="k" font-size="24">荒谷流</text>
    <text x="82" y="30" class="k" font-size="24">元</text>
    <circle cx="118" cy="20" r="16" fill="#e8756d"/>
    <text x="106" y="30" class="k" font-size="24">武</text>
    <text x="130" y="30" class="k" font-size="24">道場</text>
  </svg>`;
}

// ── Brand SVG icons ──
const ICONS = {
  youtube: `<svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
  </svg>`,
  telegram: `<svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0h-.056zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
  </svg>`,
  vk: `<svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M15.684 0H8.316C1.592 0 0 1.592 0 8.316v7.368C0 22.408 1.592 24 8.316 24h7.368C22.408 24 24 22.408 24 15.684V8.316C24 1.592 22.391 0 15.684 0zm3.692 17.123h-1.744c-.66 0-.864-.525-2.05-1.727-1.033-1-1.49-1.135-1.744-1.135-.356 0-.458.102-.458.593v1.575c0 .424-.135.678-1.253.678-1.846 0-3.896-1.12-5.335-3.202C4.624 10.857 4.03 8.57 4.03 8.096c0-.254.102-.491.593-.491h1.744c.44 0 .61.203.78.678.864 2.49 2.303 4.675 2.896 4.675.22 0 .322-.102.322-.66V9.721c-.068-1.186-.695-1.287-.695-1.71 0-.204.17-.407.44-.407h2.744c.373 0 .508.203.508.644v3.473c0 .372.17.508.271.508.22 0 .407-.136.813-.542 1.254-1.406 2.151-3.574 2.151-3.574.119-.254.322-.491.763-.491h1.744c.525 0 .644.27.525.644-.22 1.017-2.354 4.031-2.354 4.031-.186.305-.254.44 0 .78.186.254.796.779 1.203 1.253.745.847 1.32 1.558 1.473 2.05.17.49-.085.744-.576.744z"/>
  </svg>`
};

const KANJI_NUMERALS = ['一','二','三','四','五','六','七','八','九','十'];

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function placeholderSVG(index, caption) {
  const k = KANJI_NUMERALS[index] || (index + 1);
  return `<svg viewBox="0 0 700 437" xmlns="http://www.w3.org/2000/svg">
    <rect width="700" height="437" fill="#e0dbd0"/>
    <text x="350" y="200" text-anchor="middle" font-family="Noto Serif JP,serif" font-size="48" fill="#c45a3c" opacity="0.5">${k}</text>
    <text x="350" y="260" text-anchor="middle" font-family="Noto Sans,sans-serif" font-size="14" fill="#7a7062">${esc(caption)}</text>
  </svg>`;
}

(function init() {
  const { club, about, gallery, schedule, pricing, location, contact } = SITE_DATA;

  // ── Nav ──
  document.getElementById('nav-logo').innerHTML = dojoLogoNavSVG();
  document.title = club.name;

  // ── Hero ──
  document.getElementById('hero').setAttribute('data-kanji', club.kanji);
  document.getElementById('hero-logo').innerHTML = dojoLogoHTML();
  document.getElementById('hero-title').textContent = club.heroTitle;
  document.getElementById('hero-subtitle').textContent = club.heroSubtitle;

  // ── About ──
  document.getElementById('about-title').textContent = about.title;
  document.getElementById('about-text').textContent = about.text;

  // ── Gallery ──
  document.getElementById('gallery-title').textContent = gallery.title;
  const container = document.getElementById('gallery-container');
  const dotsEl = document.getElementById('gallery-dots');
  const photos = gallery.photos;

  const captionEl = document.getElementById('gallery-caption');
  captionEl.textContent = photos[0].caption;

  photos.forEach((photo, i) => {
    const slide = document.createElement('div');
    slide.className = 'gallery-slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `<img src="photos/${encodeURIComponent(photo.file)}" alt="${esc(photo.caption)}"
      onerror="this.parentNode.innerHTML=placeholderSVG(${i},'${photo.caption.replace(/'/g,"\\'")}')">`;
    container.appendChild(slide);

    const dot = document.createElement('button');
    dot.setAttribute('aria-label', `Слайд ${i + 1}`);
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });

  const slides = container.querySelectorAll('.gallery-slide');
  const dots = dotsEl.querySelectorAll('button');
  let current = 0, timer;

  function goTo(idx) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = idx;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    captionEl.textContent = photos[current].caption;
    clearInterval(timer);
    timer = setInterval(() => goTo((current + 1) % slides.length), gallery.intervalMs || 4000);
  }
  timer = setInterval(() => goTo((current + 1) % slides.length), gallery.intervalMs || 4000);

  // ── Schedule ──
  document.getElementById('schedule-title').textContent = schedule.title;
  const grid = document.getElementById('schedule-grid');
  schedule.classes.forEach(c => {
    grid.innerHTML += `<div class="schedule-card">
      <div class="day">${esc(c.day)}</div>
      <div class="time">${esc(c.time)}</div>
      <div class="level">${esc(c.level)}</div>
    </div>`;
  });

  // ── Pricing ──
  document.getElementById('pricing-title').textContent = pricing.title;
  const pg = document.getElementById('pricing-grid');
  pricing.options.forEach(opt => {
    pg.innerHTML += `<div class="pricing-card">
      <div class="price-label">${esc(opt.label)}</div>
      <div class="price">${esc(opt.price)}</div>
    </div>`;
  });

  // ── Location ──
  document.getElementById('location-title').textContent = location.title;
  let locHtml = `<p><strong>Адрес:</strong><br>${esc(location.address)}</p>`;
  if (location.metro) locHtml += `<p><strong>Метро:</strong><br>${esc(location.metro)}</p>`;
  locHtml += `<p><strong>Как добраться:</strong><br>${esc(location.directions)}</p>`;
  locHtml += `<p><strong>Что взять с собой:</strong><br>${esc(location.whatToBring)}</p>`;
  document.getElementById('location-info').innerHTML = locHtml;

  if (location.mapEmbed) {
    document.getElementById('map-container').innerHTML =
      `<iframe src="${esc(location.mapEmbed)}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
  }

  // ── Contact ──
  document.getElementById('contact-title').textContent = contact.title;
  const cg = document.getElementById('contact-grid');
  contact.items.forEach(item => {
    const iconHtml = ICONS[item.type] || '';
    cg.innerHTML += `<div class="contact-item">
      <a href="${esc(item.href)}" target="_blank" rel="noopener">
        ${iconHtml}
        <span class="label">${esc(item.label)}</span>
        <span class="value">${esc(item.value)}</span>
      </a>
    </div>`;
  });

  // ── Footer ──
  document.getElementById('footer').innerHTML =
    `&copy; ${new Date().getFullYear()} ${esc(club.name)}`;

  // ── Fade-in observer ──
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.15 });
  document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
})();

document.querySelectorAll('nav ul li a').forEach(a => {
  a.addEventListener('click', () => document.querySelector('nav ul').classList.remove('open'));
});
</script>

</body>
</html>
